name: 'CodeQL'

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - feature/*
      - release/*
      - hotfix/*
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-actions:
    name: Analyze GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          config: |
            paths:
              - '.github/actions'
              - '.github/workflows'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:actions'
          output: sarif-results

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-actions
          path: sarif-results
          retention-days: 14

  analyze-swift:
    name: Analyze Swift
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-14
    environment: sdds
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          chmod +x ./scripts/install_certificate_and_profile.sh
          ./scripts/install_certificate_and_profile.sh "$RUNNER_TEMP" "$BUILD_CERTIFICATE_BASE64" "$P12_PASSWORD" "$BUILD_PROVISION_PROFILE_BASE64" "$KEYCHAIN_PASSWORD"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
          config: |
            paths-ignore:
              - '**/build/**'
              - '**/.build/**'
              - 'Vendor/**'
              - 'docusaurus/**'

      - name: Build SDDSThemeCore XCFramework
        run: |
          cd SDDSThemeBuilder
          ruby ../scripts/build_xcframeworks.rb -d . -p SDDSThemeBuilder.xcodeproj -m SDDSThemeCore

      - name: Build all XCFrameworks
        run: |
          ./scripts/build_xcframeworks.rb -d . -w SDDS.xcworkspace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:swift'

      - name: Upload CodeQL diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-diagnostics-swift
          if-no-files-found: ignore
          path: |
            /Users/runner/work/_temp/codeql_databases/swift/log/**
            /Users/runner/work/_temp/codeql_databases/swift/diagnostic/**
            /Users/runner/work/_temp/codeql_databases/log/**
            /Users/runner/work/_temp/codeql_databases/diagnostic/**
