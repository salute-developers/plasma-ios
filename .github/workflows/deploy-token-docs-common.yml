name: 'Deploy tokens docs common'

on:
  workflow_call:
    inputs:
      modules:
        type: string
        description: 'Список модулей в формате json (например, ["styles-salute-theme", "sddsserv-theme", "plasma-b2c-theme", "plasma-home-ds-theme"]). Если пустое, используется весь список тем.'
        required: false
        default: '["styles-salute-theme", "sddsserv-theme", "plasma-b2c-theme", "plasma-home-ds-theme"]'
      versions:
        type: string
        description: 'Опциональный JSON map модуль->версия (например, {"sddsserv-theme":"0.19.0"}). Если версия задана, она имеет приоритет над ref для конкретного модуля.'
        required: false
        default: ''
      ref:
        type: string
        description: 'Название ветки, тэга или хэш коммита'
        required: true
      branch:
        type: string
        description: 'Название ветки для деплоя'
        required: false
      custom_deploy_path:
        type: string
        description: 'Кастомный путь для деплоя (например: test/custom/path/ или experimental/ios/components/)'
        required: false

jobs:
  changelog:
    name: Prepare changelog
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.build-changelog.outputs.changelog }}
      changelog_json: ${{ steps.build-changelog.outputs.changelog_json }}
    steps:
      # Всегда делаем checkout main для получения актуальных workflow файлов и actions
      - name: Checkout main (for workflows and actions)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Build Changelog
        id: build-changelog
        uses: ./.github/actions/release-changelog
        with:
          # Используем тег релиза только для формирования changelog
          toTag: ${{ inputs.ref }}
      
      - name: Debug raw changelog from mikepenz action
        shell: bash
        run: |
          echo "🔍 Debug: Raw changelog from mikepenz action (первые 1000 символов):"
          echo "${{ steps.build-changelog.outputs.changelog }}" | head -c 1000 || echo "Changelog пуст или не найден"
          echo ""
          echo "🔍 Длина changelog: $(echo "${{ steps.build-changelog.outputs.changelog }}" | wc -c) символов"
  deploy:
    name: Deploy docs
    needs: changelog
    runs-on: macos-latest
    environment: sdds
    if: inputs.ref != ''
    strategy:
      fail-fast: false
      matrix:
        module: 
          - sddsserv-theme
          - styles-salute-theme
          - plasma-b2c-theme
          - plasma-home-ds-theme
        include:
          - module: sddsserv-theme
            theme_name: sddsserv
          - module: styles-salute-theme
            theme_name: styles-salute
          - module: plasma-b2c-theme
            theme_name: plasma-b2c
          - module: plasma-home-ds-theme
            theme_name: plasma-homeds
    steps:
      - name: Check if module should be deployed
        id: check_module
        run: |
          # Проверяем, есть ли модуль в списке для деплоя
          modules='${{ inputs.modules }}'
          module='${{ matrix.module }}'
          
          # Если modules пустое, используем значение по умолчанию
          if [[ -z "$modules" || "$modules" == "" ]]; then
            modules='["styles-salute-theme", "sddsserv-theme", "plasma-b2c-theme", "plasma-home-ds-theme"]'
            echo "🔍 Using default modules list: $modules"
          fi
          
          echo "🔍 Debug info:"
          echo "  modules='$modules'"
          echo "  module='$module'"
          echo "  modules length: ${#modules}"
          echo "  module length: ${#module}"
          
          # Проверяем разные варианты формата
          if echo "$modules" | grep -q "\"$module\"" || echo "$modules" | grep -q "'$module'" || echo "$modules" | grep -q "$module"; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Module '$module' found in modules list"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "❌ Module '$module' not found in modules list"
          fi
      
      # Всегда делаем checkout main для получения актуальных workflow файлов и actions
      - name: Checkout main (for workflows and actions)
        if: steps.check_module.outputs.should_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Create release-changelog.md
        if: steps.check_module.outputs.should_deploy == 'true'
        shell: bash
        run: |
          cat > "${{ github.workspace }}/release-changelog.md" <<EOF
          ${{ needs.changelog.outputs.content }}
          EOF
          echo "🔍 Debug: release-changelog.md создан, размер: $(wc -c < "${{ github.workspace }}/release-changelog.md") байт"
          echo "🔍 Первые 100 строк release-changelog.md:"
          head -100 "${{ github.workspace }}/release-changelog.md" || echo "Файл пуст или не найден"
      
      - name: Create release-changelog.json
        if: steps.check_module.outputs.should_deploy == 'true'
        shell: bash
        run: |
          cat > "${{ github.workspace }}/release-changelog.json" <<EOF
          ${{ needs.changelog.outputs.changelog_json }}
          EOF
          echo "🔍 Debug: release-changelog.json создан, размер: $(wc -c < "${{ github.workspace }}/release-changelog.json") байт"
          echo "🔍 Changelog JSON:"
          cat "${{ github.workspace }}/release-changelog.json" | jq . || echo "JSON не найден или невалиден"

      - name: Set up Xcode
        if: steps.check_module.outputs.should_deploy == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'
          
      - name: Install the Apple certificate and provisioning profile
        if: steps.check_module.outputs.should_deploy == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          chmod +x ./scripts/install_certificate_and_profile.sh
          ./scripts/install_certificate_and_profile.sh "$RUNNER_TEMP" "$BUILD_CERTIFICATE_BASE64" "$P12_PASSWORD" "$BUILD_PROVISION_PROFILE_BASE64" "$KEYCHAIN_PASSWORD"

      - name: Extract branch name
        if: steps.check_module.outputs.should_deploy == 'true'
        id: extract_branch
        shell: bash
        run: |
          if [[ -n "${{ inputs.branch }}" ]]; then
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check_module.outputs.should_deploy == 'true'
        run: |
          # Устанавливаем Node.js и Yarn через Homebrew
          brew install node yarn jq s3cmd

      - name: Resolve version input for module
        if: steps.check_module.outputs.should_deploy == 'true'
        id: resolve_version
        shell: bash
        run: |
          versions='${{ inputs.versions }}'
          module='${{ matrix.module }}'
          version_input='${{ inputs.ref }}'

          if [[ -n "$versions" ]] && echo "$versions" | jq -e . >/dev/null 2>&1; then
            module_version=$(echo "$versions" | jq -r --arg module "$module" '.[$module] // empty')
            if [[ -n "$module_version" ]]; then
              version_input="$module_version"
              echo "✅ Using explicit version for $module: $version_input"
            else
              echo "ℹ️ No explicit version for $module, fallback to ref: $version_input"
            fi
          else
            echo "ℹ️ versions input is empty or invalid JSON, fallback to ref: $version_input"
          fi

          echo "version_input=$version_input" >> $GITHUB_OUTPUT

      - name: Build SDDSComponentsFixtures
        if: steps.check_module.outputs.should_deploy == 'true'
        run: |
          cd SDDSComponentsFixtures
          xcodebuild -scheme SDDSComponentsFixtures -destination 'generic/platform=iOS' build >/dev/null 2>&1 || true

      - name: Run deploy and collect result
        if: steps.check_module.outputs.should_deploy == 'true'
        id: deploy
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          ARTIFACT_ID: ":tokens:${{ matrix.module }}"
          VERSION_INPUT: ${{ steps.resolve_version.outputs.version_input }}
          BRANCH_NAME: ${{ steps.extract_branch.outputs.branch }}
          TARGET_TYPE: swiftui
          THEME_NAME: ${{ matrix.theme_name }}
          DOCS_URL: https://plasma.sberdevices.ru
        run: |
          cd docusaurus
          
          # Отладочная информация о переменных окружения
          echo "🔍 Отладочная информация о переменных окружения:"
          echo "  S3_ACCESS_KEY_ID: '${S3_ACCESS_KEY_ID:0:3}***' (длина: ${#S3_ACCESS_KEY_ID})"
          echo "  S3_SECRET_ACCESS_KEY: '${S3_SECRET_ACCESS_KEY:0:3}***' (длина: ${#S3_SECRET_ACCESS_KEY})"
          echo "  S3_ENDPOINT: '$S3_ENDPOINT' (длина: ${#S3_ENDPOINT})"
          echo "  S3_REGION: '$S3_REGION' (длина: ${#S3_REGION})"
          echo "  S3_BUCKET: '$S3_BUCKET' (длина: ${#S3_BUCKET})"
          
          # Формируем команду деплоя с S3 параметрами как аргументами
          # Передаем VERSION_INPUT (тег) в deploy.sh, он сам извлечет версию из Xcode проекта
          DEPLOY_CMD="./deploy.sh --s3 \"$ARTIFACT_ID\" \"$VERSION_INPUT\" \"$BRANCH_NAME\" \"$TARGET_TYPE\" \"$THEME_NAME\" \"$CODE_REFERENCE\" \"$DOCS_URL\" \"$S3_ACCESS_KEY_ID\" \"$S3_SECRET_ACCESS_KEY\" \"$S3_ENDPOINT\" \"$S3_REGION\" \"$S3_BUCKET\""
          
          # Добавляем кастомный путь деплоя если указан
          if [[ -n "${{ inputs.custom_deploy_path }}" ]]; then
            DEPLOY_CMD="./deploy.sh --s3 \"$ARTIFACT_ID\" \"$VERSION_INPUT\" \"$BRANCH_NAME\" \"$TARGET_TYPE\" \"$THEME_NAME\" \"$CODE_REFERENCE\" \"$DOCS_URL\" \"$S3_ACCESS_KEY_ID\" \"$S3_SECRET_ACCESS_KEY\" \"$S3_ENDPOINT\" \"$S3_REGION\" \"$S3_BUCKET\" --deploy-path=\"${{ inputs.custom_deploy_path }}\""
          fi
          
          # Выполняем деплой
          echo "🚀 Выполняем команду: $DEPLOY_CMD"
          echo "🔍 S3 параметры переданы как аргументы команды"
          eval $DEPLOY_CMD

      - name: Run deploy changelog
        if: steps.check_module.outputs.should_deploy == 'true'
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          cd docusaurus
          ./scripts/deploy-changelog.sh \
            ":tokens:${{ matrix.module }}" \
            "${{ steps.resolve_version.outputs.version_input }}" \
            "${{ steps.extract_branch.outputs.branch }}" \
            "${{ secrets.S3_ACCESS_KEY_ID }}" \
            "${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            "${{ secrets.S3_ENDPOINT }}" \
            "${{ secrets.S3_REGION }}" \
            "${{ secrets.S3_BUCKET }}"

      - name: Prepare deploy artifacts
        if: steps.check_module.outputs.should_deploy == 'true' && success()
        shell: bash
        run: |
          module="${{ matrix.module }}"
          clean_module="${module//-/_}"
          artifact_name="docusaurus-ios-${clean_module}-result"
          mkdir -p artifacts/ios/${module}
          
          # Копируем deploy.json если существует
          if [[ -f "docusaurus/build/generated/docusaurus/deploy.json" ]]; then
            cp docusaurus/build/generated/docusaurus/deploy.json artifacts/ios/${module}/deploy.json
            echo "✅ Скопирован deploy.json"
          fi
          
          echo "ARTIFACT_NAME=$artifact_name" >> $GITHUB_ENV
          echo "📦 Подготовлен артефакт: $artifact_name"

      - name: Upload deploy result
        if: steps.check_module.outputs.should_deploy == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/ios/${{ matrix.module }}/
          