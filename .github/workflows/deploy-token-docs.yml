name: 'Deploy tokens docs'

on:
  repository_dispatch:
    types: [publish-tokens]
  workflow_dispatch:
    inputs:
      modules:
        type: string
        description: 'Список модулей в формате json (например, ["styles-salute-theme", "sddsserv-theme", "plasma-b2c-theme", "plasma-home-ds-theme"]). Если пустое, используется весь список тем.'
        required: false
      versions:
        type: string
        description: 'Опциональный JSON map модуль->версия (например, {"sddsserv-theme":"0.19.0"}). Если версия задана, она имеет приоритет над tag/ref для этого модуля.'
        required: false
      tag:
        description: "Тэг для релиза"
        required: true

concurrency:
  # New commit on branch cancels running workflows of the same branch
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  state:
    name: Prepare state
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.prepare.outputs.ref }}
      modules: ${{ steps.prepare.outputs.modules }}
      versions: ${{ steps.prepare.outputs.versions }}

    steps:
      - name: Prepare modules and tag
        id: prepare
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "Using modules and tag from repository_dispatch event"
            {
              echo "modules<<EOF"
              echo '${{ github.event.client_payload.modules }}'
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "versions<<EOF"
              echo '${{ github.event.client_payload.versions }}'
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
          else
            echo "Using modules and tag from workflow_dispatch input"
            echo "Input modules ${{ github.event.inputs.modules }}"
            {
              echo "modules<<EOF"
              echo '${{ github.event.inputs.modules }}'
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "versions<<EOF"
              echo '${{ github.event.inputs.versions }}'
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy docs
    needs: state
    uses: ./.github/workflows/deploy-token-docs-common.yml
    secrets: inherit
    with:
      modules: ${{ needs.state.outputs.modules }}
      versions: ${{ needs.state.outputs.versions }}
      ref: ${{ needs.state.outputs.ref }}
      branch: ${{ github.head_ref || github.ref_name }}

  update-summary:
    name: Update summary.json
    needs: deploy
    if: needs.deploy.result == 'success' && github.ref_name == 'main'
    uses: ./.github/workflows/generate-summary.yml
    secrets: inherit
    with:
      branch_name: main
      docs_url: https://plasma.sberdevices.ru